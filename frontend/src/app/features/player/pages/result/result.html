<div class="vs-result-page">
  <app-topbar active="play" />

  <div class="vs-result" [class.is-win]="isWin()" [class.is-loss]="!isWin()">

    <div class="vs-result__hero">
      <div class="vs-q-label">{{ modeLabel() }}</div>
      <div class="vs-display vs-result__verdict">
        {{ isWin() ? '¡EL ÚLTIMO EN PIE!' : 'GAME OVER' }}
      </div>
      @if (state(); as s) {
        <div style="color: var(--vs-text-secondary); margin-top: 4px">
          Aguantaste <strong class="vs-mono">{{ s.rounds }} preguntas</strong>.
        </div>
      }
    </div>

    <div class="vs-result__stats">
      @for (s of stats(); track s.label) {
        <div class="vs-stat-block">
          <div class="vs-stat-num" [style.color]="s.accent || null">{{ s.num }}</div>
          <div class="vs-stat-label">{{ s.label }}</div>
        </div>
      }
    </div>

    <div style="display: flex; gap: 12px; justify-content: center">
      <a routerLink="/dashboard" class="btn btn--ghost btn--lg">VOLVER AL INICIO</a>
      <a [routerLink]="replayLink()" class="btn btn--danger btn--lg">▶ OTRA PARTIDA</a>
    </div>

  </div>
</div>
