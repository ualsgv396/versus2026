spring.datasource.url=jdbc:h2:mem:versus_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.profiles.active=test

versus.jwt.secret=test-secret-test-secret-test-secret-test-secret-test-secret-test-secret-aaaa
versus.jwt.access-expiry=900
versus.jwt.refresh-expiry=604800
versus.seed.enabled=false
