spring.application.name=api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appdb}
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASS:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

versus.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-make-this-very-long-at-least-64-bytes-aaaaaaaa}
versus.jwt.access-expiry=${JWT_EXPIRY:900}
versus.jwt.refresh-expiry=${JWT_REFRESH_EXPIRY:604800}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.error.include-message=always

spring.servlet.multipart.max-file-size=${MEDIA_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MEDIA_MAX_REQUEST_SIZE:10MB}

versus.storage.provider=${STORAGE_PROVIDER:local}
versus.storage.local-root=${STORAGE_LOCAL_ROOT:target/local-storage}
versus.storage.public-path=/media-files/
versus.storage.public-base-url=${MEDIA_PUBLIC_BASE_URL:${R2_PUBLIC_BASE_URL:}}
versus.storage.bucket=${R2_BUCKET:versus-media-dev}
versus.storage.r2.endpoint=${R2_ENDPOINT:}
versus.storage.r2.access-key-id=${R2_ACCESS_KEY_ID:}
versus.storage.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
versus.storage.max-file-size-bytes=${MEDIA_MAX_FILE_SIZE_BYTES:10485760}
versus.storage.max-avatar-size-bytes=${MEDIA_MAX_AVATAR_SIZE_BYTES:2097152}
versus.storage.allowed-content-types=image/jpeg,image/png,image/webp,image/gif,video/mp4,audio/mpeg,audio/ogg,application/pdf,text/plain
