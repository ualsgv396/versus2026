
# Overrides para desarrollo
#
# Características:
#   - Hot reload en frontend (ng serve) y backend (spring-boot:run)
#   - El código se monta desde el host → no hace falta rebuild al cambiar código
#   - Puerto de debug remoto en el backend (5005)
#   - pgAdmin para inspeccionar la BD visualmente
#   - Variables de entorno de desarrollo

services:
  db:
    ports:
      - "5432:5432"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP (recibe todos los correos del backend)
      - "8025:8025"   # Web UI — abre http://localhost:8025 para ver los emails
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development      # stage development
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ./backend:/app         # Monta el código fuente del host
      - maven_cache:/root/.m2  # Caché de Maven entre reinicios
    depends_on:
      - mailhog
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      DDL_AUTO: create-drop    # Recrea la BD en cada arranque (dev)
      # ── Mail (leído del .env — MailHog por defecto, Gmail si se configura) ──
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      MAIL_FROM: ${MAIL_FROM:-noreply@versus-dev.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Versus Dev}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:4200}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development      # stage development
    ports:
      - "4200:4200"           
    volumes:
      - ./frontend:/app        # Monta el código fuente del host
      - node_modules:/app/node_modules  # Evita sobreescribir node_modules con el volumen del host
    environment:
      NODE_ENV: development

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    volumes:
      - ./scraper:/app        # Hot reload del código
    environment:
      ENV: development
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  docs:
    image: python:3.12-slim
    profiles:
      - docs
    working_dir: /app
    command: >
      sh -c "pip install --quiet -r requirements-docs.txt &&
             mkdocs serve --dev-addr 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    networks:
      - app-network

volumes:
  maven_cache:
  node_modules:
  scraper_output:
  pgadmin_data:
